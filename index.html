<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Our Wedding</title>
    <link
      rel="shortcut icon"
      href="./src/assets/OIP (1).jfif"
      type="image/x-icon"
    />
    <link href="./src/output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Edu+NSW+ACT+Cursive:wght@400..700&family=Great+Vibes&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Pacifico&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container 2xl:w-7xl mx-auto">
      <!-- envelope -->
      <div
        class="relative  mx-auto bg-[#E7E4DE] top-0 shadow-2xl overflow-hidden"
        id="envelope"
      >
        <div class="absolute w-full shadow-2xl rounded-md"></div>

        <div
          class="absolute inset-0 bg-[#C9BFB1]"
          id="topFlap"
          style="clip-path: polygon(0 0, 100% 0, 50% 100%)"
        ></div>

        <div
          id="bottomFlap"
          class="absolute inset-0 bg-[#D2CAC2] z-10"
          style="clip-path: polygon(0 100%, 100% 100%, 50% 50%)"
        ></div>

        <div
          id="leftFlap"
          class="absolute inset-0 bg-[#D2CAC2] z-10"
          style="clip-path: polygon(0 0, 0 100%, 50% 50%)"
        ></div>

        <div
          id="rightFlap"
          class="absolute inset-0 bg-[#D2CAC2] z-10"
          style="clip-path: polygon(100% 0, 100% 100%, 50% 50%)"
        ></div>
        <div class="flex justify-center items-center">
          <div
            id="clickedButton"
            class="absolute cursor-pointer border-2 z-50 border-[#CAC1B3] flex justify-center items-center rounded-3xl w-[65px] h-[65px] bg-[#D2CAC2]"
          >
            <div
              class="border-2 border-[#CAC1B3] rounded-full overflow-hidden w-[50px] h-[50px]"
            >
              <img
                src="./src/assets/OIP (1).jfif"
                class="w-full h-full object-cover rounded-full z-40"
                alt=""
              />
            </div>
          </div>
          <div
            id="card"
            class="flex flex-col justify-center relative z-30 items-center h-lvh font-bold text-[#a69277] top-25"
          >
            <h1 class="text-3xl">This invitation exclusive for you</h1>
            <h2 class="font-bold text-2xl">Hesham & Hadeel</h2>
          </div>
        </div>
      </div>
      <!-- main content -->
      <div id="mainContent" class=" bg-[#E6D8C8] hidden">
        <div class="h-lvh flex justify-center items-center"><img
          src="./src/assets/first.jpeg"
          class="w-full h-lvh object-center   rounded-2xl rounded-t-none "
          alt="weeding place"
        /></div>
        <div class="mt-5 relative flex justify-center items-center">
          <img src="./src/assets/card.png" class="rounded-2xl w-full" />
          <h3
            class="absolute text-center text-xl text-[#A69277] font-bold w-1/2"
          >
            Together with their families request the honor of your presence at
            the wedding celebration of.<br />
            Hesham & Hadeel<br />
            Your presence will make our day truly special.
          </h3>
        </div>
        <div class="flex justify-center text-[#a69277] font-bold">
          <h2
            class="text-3xl border-2 border-[#F5E7D8] bg-[#F5E7D8] hover:scale-110 transition-all duration-500 rounded-2xl p-5 my-2"
          >
            Date for wedding
          </h2>
        </div>
        <div class="">
          <img
            src="./src/assets/clock.png"
            class="w-[90%] mx-auto rounded-2xl rounded-b-none"
            alt="clock"
          />
          <div
            class="flex justify-center rounded-2xl rounded-t-none w-[90%] bg-[#F3E4D4] mx-auto"
          >
            <h3 class="text-4xl text-[#a69277] font-bold">16.10.2026</h3>
          </div>
        </div>

        <div class="flex justify-center mt-5 text-[#a69277] font-bold">
          <h2
            class="text-3xl border-2 border-[#F5E7D8] bg-[#F5E7D8] hover:scale-110 transition-all duration-500 rounded-2xl p-5 my-2"
          >
            Our location
          </h2>
        </div>
        <div class="flex justify-center">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3452.6374909376973!2d31.499351400000002!3d30.075923899999996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1458195315104b4f%3A0xe9bd10affece867e!2sThe%20Garden%20Venue!5e0!3m2!1sen!2seg!4v1782844269620!5m2!1sen!2seg"
            width="90%"
            height="450"
            style="border: 0"
            class="rounded-2xl"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="strict-origin-when-cross-origin"
          ></iframe>
        </div>
      </div>
    </div>
    <script src="./js/index.js"></script>
  </body>
</html>
